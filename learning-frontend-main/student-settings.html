<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設定 - Merge 學生後台</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/scss/all.scss">
</head>
<body class="student-layout">

    <div class="student-container">
        
        <!-- 左側導覽列 -->
        <aside class="student-sidebar" id="student-sidebar">
            <div class="student-sidebar-logo">
                <a href="student-dashboard.html" class="d-flex align-items-center gap-3 text-decoration-none">
                    <div>
                        <div class="logo-text">Merge</div>
                        <div class="logo-sub">STUDENT</div>
                    </div>
                </a>
            </div>

            <nav class="student-nav">
                <a href="student-dashboard.html" class="student-nav-link">
                    <span class="material-symbols-outlined">dashboard</span>
                    <span>控制台</span>
                </a>
                <a href="student-courses.html" class="student-nav-link">
                    <span class="material-symbols-outlined">school</span>
                    <span>學習與課程</span>
                </a>
                <a href="StudentChat.html" class="student-nav-link">
                    <span class="material-symbols-outlined">chat_bubble</span>
                    <span>訊息中心</span>
                </a>
                <a href="student-credits.html" class="student-nav-link">
                    <span class="material-symbols-outlined">account_balance_wallet</span>
                    <span>儲值與明細</span>
                </a>
                <a href="student-settings.html" class="student-nav-link active">
                    <span class="material-symbols-outlined">settings</span>
                    <span>設定</span>
                </a>
            </nav>

            <div class="student-sidebar-footer">
                <div class="student-user-info">
                    <div class="student-avatar">
                        <span class="material-symbols-outlined">account_circle</span>
                    </div>
                    <div class="student-info">
                        <div class="student-name" id="sidebar-name">學生</div>
                        <div class="student-role">Student</div>
                    </div>
                </div>
                <button class="student-logout-btn" id="logout-btn" title="登出">
                    <span class="material-symbols-outlined">logout</span>
                </button>
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- 主內容區 -->
        <main class="student-main">
            
            <!-- 頁面標題 -->
            <div class="page-header">
                <div>
                    <h1 class="page-title">設定</h1>
                    <p class="page-desc">管理您的個人資料</p>
                </div>
                <button class="btn-mobile-menu" id="sidebar-toggle">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </div>

            <!-- 個人資料卡片 -->
            <div class="content-card mb-4">
                <div class="card-header">
                    <h3 class="card-title">
                        <span class="material-symbols-outlined">person</span>
                        個人資料
                    </h3>
                </div>
                <div class="card-body">
                    <form id="profile-form">
                        <div class="mb-3">
                            <label class="form-label">姓名</label>
                            <input type="text" class="form-control" id="input-name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="input-email" disabled>
                            <small class="text-muted">Email 無法修改</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">生日（選填）</label>
                            <input type="date" class="form-control" id="input-birthday">
                        </div>
                        <button type="submit" class="btn-primary-custom">
                            <span class="material-symbols-outlined">save</span>
                            儲存變更
                        </button>
                    </form>
                </div>
            </div>

            <!-- 修改密碼卡片 -->
            <div class="content-card">
                <div class="card-header">
                    <h3 class="card-title">
                        <span class="material-symbols-outlined">lock</span>
                        修改密碼
                    </h3>
                </div>
                <div class="card-body">
                    <form id="password-form">
                        <div class="mb-3">
                            <label class="form-label">目前密碼</label>
                            <input type="password" class="form-control" id="input-current-password" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">新密碼</label>
                            <input type="password" class="form-control" id="input-new-password" required minlength="8">
                            <small class="text-muted">至少 8 個字元</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">確認新密碼</label>
                            <input type="password" class="form-control" id="input-confirm-password" required>
                        </div>
                        <button type="submit" class="btn-primary-custom">
                            <span class="material-symbols-outlined">key</span>
                            更新密碼
                        </button>
                    </form>
                </div>
            </div>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./assets/js/navbar.js"></script>
    <script src="./assets/js/student-layout.js"></script>
    <script src="./assets/js/student-settings.js"></script>

</body>
</html>
