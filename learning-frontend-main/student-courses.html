<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習與課程 - Merge 學生後台</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/scss/all.scss">
    <style>
        /* ── 課程卡片 ── */
        .booking-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            gap: 16px;
            transition: box-shadow 0.2s;
        }
        .booking-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }

        .date-badge {
            flex-shrink: 0;
            width: 52px;
            height: 60px;
            background: #f3f4f6;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .date-badge .bmonth { font-size: 11px; color: #6b7280; text-transform: uppercase; }
        .date-badge .bday   { font-size: 22px; font-weight: 700; color: #111827; line-height: 1; }
        .date-badge.completed { background: #d1fae5; }
        .date-badge.cancelled { background: #fee2e2; }

        .booking-info { flex: 1; min-width: 0; }
        .booking-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .booking-title { font-size: 16px; font-weight: 700; margin: 0 0 4px; }
        .booking-teacher { display: flex; align-items: center; gap: 4px; color: #6b7280; font-size: 13px; }
        .booking-teacher .material-symbols-outlined { font-size: 15px; }

        .status-pill {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: #dbeafe;
            color: #1d4ed8;
        }
        .status-pill.completed { background: #d1fae5; color: #065f46; }
        .status-pill.cancelled { background: #fee2e2; color: #991b1b; }

        .time-tag { display: flex; align-items: center; gap: 4px; font-size: 13px; color: #6b7280; }
        .time-tag .material-symbols-outlined { font-size: 15px; }

        /* ── 評價/回饋區 ── */
        .feedback-box {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 14px;
            height: 100%;
        }
        .feedback-box-title {
            font-size: 13px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .feedback-box-title .material-symbols-outlined { font-size: 16px; }

        .star-btn {
            font-size: 24px;
            cursor: pointer;
            color: #d1d5db;
            transition: color 0.1s;
            user-select: none;
            letter-spacing: 2px;
        }
        .star-btn.active { color: #f59e0b; }

        .score-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .score-row > span:first-child { width: 44px; color: #6b7280; flex-shrink: 0; }
        .score-row > span:last-child  { width: 28px; text-align: right; color: #374151; font-weight: 600; flex-shrink: 0; }
        .score-bar {
            flex: 1;
            height: 6px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        .score-bar > div { height: 100%; background: #10b981; border-radius: 4px; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }
        .empty-state .material-symbols-outlined { font-size: 48px; margin-bottom: 8px; }
    </style>
</head>
<body class="student-layout">

    <div class="student-container">

        <!-- 左側導覽列 -->
        <aside class="student-sidebar" id="student-sidebar">
            <div class="student-sidebar-logo">
                <a href="student-dashboard.html" class="d-flex align-items-center gap-3 text-decoration-none">
                    <div>
                        <div class="logo-text">Merge</div>
                        <div class="logo-sub">STUDENT</div>
                    </div>
                </a>
            </div>

            <nav class="student-nav">
                <a href="student-dashboard.html" class="student-nav-link">
                    <span class="material-symbols-outlined">dashboard</span>
                    <span>控制台</span>
                </a>
                <a href="student-courses.html" class="student-nav-link active">
                    <span class="material-symbols-outlined">school</span>
                    <span>學習與課程</span>
                </a>
                <a href="StudentChat.html" class="student-nav-link">
                    <span class="material-symbols-outlined">chat_bubble</span>
                    <span>訊息中心</span>
                </a>
                <a href="student-credits.html" class="student-nav-link">
                    <span class="material-symbols-outlined">account_balance_wallet</span>
                    <span>儲值與明細</span>
                </a>
                <a href="student-settings.html" class="student-nav-link">
                    <span class="material-symbols-outlined">settings</span>
                    <span>設定</span>
                </a>
            </nav>

            <div class="student-sidebar-footer">
                <div class="student-user-info">
                    <div class="student-avatar">
                        <span class="material-symbols-outlined">account_circle</span>
                    </div>
                    <div class="student-info">
                        <div class="student-name" id="sidebar-name">學生</div>
                        <div class="student-role">Student</div>
                    </div>
                </div>
                <button class="student-logout-btn" id="logout-btn" title="登出">
                    <span class="material-symbols-outlined">logout</span>
                </button>
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- 主內容區 -->
        <main class="student-main">

            <div class="page-header">
                <div>
                    <h1 class="page-title">學習與課程</h1>
                    <p class="page-desc">查看您的所有學習紀錄與評價</p>
                </div>
                <button class="btn-mobile-menu" id="sidebar-toggle">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </div>

            <!-- 篩選標籤 -->
            <div class="filter-tabs mb-4">
                <button class="filter-tab active" data-tab="upcoming">
                    <span class="material-symbols-outlined">event_upcoming</span>
                    即將開始
                </button>
                <button class="filter-tab" data-tab="completed">
                    <span class="material-symbols-outlined">check_circle</span>
                    已完成
                </button>
                <button class="filter-tab" data-tab="cancelled">
                    <span class="material-symbols-outlined">cancel</span>
                    已取消
                </button>
            </div>

            <!-- 課程列表 -->
            <div id="tab-upcoming"></div>
            <div id="tab-completed" class="d-none"></div>
            <div id="tab-cancelled" class="d-none"></div>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./assets/js/navbar.js"></script>
    <script src="./assets/js/student-layout.js"></script>
    <script src="./assets/js/student-courses.js"></script>

</body>
</html>
